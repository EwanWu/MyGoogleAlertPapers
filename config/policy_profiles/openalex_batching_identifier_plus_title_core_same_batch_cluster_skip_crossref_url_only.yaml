profile_name: openalex_batching_identifier_plus_title_core_same_batch_cluster_skip_crossref_url_only
summary: >
  Narrow experimental profile: preserve the promoted same-batch-cluster default,
  but skip only crossref title-lane requests whose residual identifier-gap
  subgroup is url_canonical_only.
notes:
  - One-factor ablation against the promoted same-batch-cluster default
  - Keep library prelink, same-batch clustering, and current identifier/title lane shape
  - Only suppress crossref title fallback for residual url_canonical_only cases
provider_rules:
  crossref:
    enabled: true
    title_payload_reuse_enabled: true
  openalex:
    enabled: true
    doi_batch_enabled: true
    title_payload_reuse_enabled: true
  semanticscholar:
    enabled: true
    title_payload_reuse_enabled: true
  pubmed:
    enabled: true
    fallback_only_for_core_fields: true
  europepmc:
    enabled: true
    trigger_mode: narrowed_biomedical_fallback
  arxiv:
    enabled: true
    trigger_mode: arxiv_native_only
merge_rules:
  pubmed_title_doi_suppression: true
  normalized_only_fallback: true
  fallback_reject_author_blob_identifier_aware: true
runtime_rules:
  lane_order:
    - identifier_fastpath
    - title_core
    - biomedical_fallback
    - slow_fallback
  enabled_lanes:
    - identifier_fastpath
    - title_core
  library_prelink_enabled: true
  same_batch_clustering_enabled: true
  title_lane_skip_subreasons_by_provider:
    crossref:
      - url_canonical_only
replay_defaults:
  stages:
    - normalize
    - enrich
    - merge
    - dedup
