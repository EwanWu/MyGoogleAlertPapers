profile_name: baseline_guardrail
summary: Stable guardrail baseline for same-batch replay validation before normalized-only fallback is enabled.
notes:
  - Crossref -> OpenAlex -> Semantic Scholar as main DOI/title path
  - PubMed as fallback-only for title/venue/doi and stronger for PMID-led biomedical resolution
  - Europe PMC as narrowed biomedical bridge/fallback
  - arXiv as narrow-trigger source for arXiv-native candidates
provider_rules:
  crossref:
    enabled: true
  openalex:
    enabled: true
    doi_batch_enabled: true
  semanticscholar:
    enabled: true
  pubmed:
    enabled: true
    fallback_only_for_core_fields: true
  europepmc:
    enabled: true
    trigger_mode: narrowed_biomedical_fallback
  arxiv:
    enabled: true
    trigger_mode: arxiv_native_only
merge_rules:
  pubmed_title_doi_suppression: true
  normalized_only_fallback: false
replay_defaults:
  stages:
    - normalize
    - enrich
    - merge
    - dedup
